services:
  hermes:
    profiles:
      - hermes
    build:
      context: .
      dockerfile: Dockerfile.hermes
    image: eia-ai-hermes:latest
    container_name: eia-ai-hermes
    restart: unless-stopped
    command: /opt/eia/start-hermes.sh
    environment:
      HERMES_UID: ${HOST_UID:-1000}
      HERMES_GID: ${HOST_GID:-1000}
      HERMES_API_SERVER_KEY: ${HERMES_API_SERVER_KEY:-change-me}
      API_SERVER_KEY: ${HERMES_API_SERVER_KEY:-change-me}
      API_SERVER_ENABLED: "true"
      API_SERVER_HOST: 0.0.0.0
      API_SERVER_PORT: 8642
      API_SERVER_MODEL_NAME: hermes-agent
      LLM_PROVIDER: ${LLM_PROVIDER:-custom}
      LLM_MODEL: ${LLM_MODEL:-gpt-5.5}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      CUSTOM_BASE_URL: ${CUSTOM_BASE_URL:-}
      DEEPSEEK_API_KEY: ${DEEPSEEK_API_KEY:-}
      HERMES_REASONING_EFFORT: ${HERMES_REASONING_EFFORT:-xhigh}
      HERMES_MAX_TURNS: ${HERMES_MAX_TURNS:-60}
      HERMES_WEB_BACKEND: ${HERMES_WEB_BACKEND:-ddgs}
      HERMES_WEB_SEARCH_BACKEND: ${HERMES_WEB_SEARCH_BACKEND:-ddgs}
      FIRECRAWL_API_KEY: ${FIRECRAWL_API_KEY:-}
      TAVILY_API_KEY: ${TAVILY_API_KEY:-}
      EXA_API_KEY: ${EXA_API_KEY:-}
      PARALLEL_API_KEY: ${PARALLEL_API_KEY:-}
    ports:
      - "127.0.0.1:${HERMES_PORT:-8642}:8642"
    volumes:
      - ./docker/hermes-data:/opt/data
      - ./docker/hermes/start-hermes.sh:/opt/eia/start-hermes.sh:ro
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    working_dir: /app
    networks:
      - eia-ai-net
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://127.0.0.1:8642/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 60s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
      network: host
      args:
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.tuna.tsinghua.edu.cn/simple}
    image: eia-ai-backend:latest
    container_name: eia-ai-backend
    restart: unless-stopped
    environment:
      HERMES_BASE_URL: ${HERMES_BASE_URL:-http://host.docker.internal:8642}
      HERMES_API_KEY: ${HERMES_API_SERVER_KEY:-change-me}
      HERMES_MODEL: hermes-agent
      HERMES_REQUEST_TIMEOUT: ${HERMES_REQUEST_TIMEOUT:-3600}
      UPLOAD_DIR: /app/data/uploads
      LANGGRAPH_CHECKPOINT_DIR: /app/data/tasks
      LANGGRAPH_CHECKPOINT_DB: /app/data/langgraph_checkpoints.sqlite
      TASK_WORKSPACE_DIR: /app/data/workspaces
      OUTPUT_DIR: /app/outputs
      LOG_DIR: /app/logs
      KNOWLEDGE_DIR: /app/data/knowledge
    ports:
      - "${APP_PORT:-8501}:8501"
    volumes:
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./logs:/app/logs
      - ./.state:/app/.state
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - eia-ai-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8501/api/health', timeout=8).read()\" || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 10

networks:
  eia-ai-net:
    driver: bridge
